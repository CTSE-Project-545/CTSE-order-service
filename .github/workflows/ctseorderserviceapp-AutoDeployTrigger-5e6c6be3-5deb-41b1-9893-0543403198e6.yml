name: Trigger auto deployment for ctseorderserviceapp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ctseorderserviceapp-AutoDeployTrigger-5e6c6be3-5deb-41b1-9893-0543403198e6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CTSEORDERSERVICEAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CTSEORDERSERVICEAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CTSEORDERSERVICEAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ctseauthcontainer.azurecr.io
          registryUsername: ${{ secrets.CTSEORDERSERVICEAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CTSEORDERSERVICEAPP_REGISTRY_PASSWORD }}
          containerAppName: ctseorderserviceapp
          resourceGroup: CTSE_GROUP
          imageToBuild: ctseauthcontainer.azurecr.io/ctseorderserviceapp:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


